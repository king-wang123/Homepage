name: Build and Deploy to king-wang123.github.io

# Source code lives in this repo (king-wang123/Homepage).
# The live site is served from the separate repo king-wang123/king-wang123.github.io
# at the root URL https://king-wang123.github.io/.
# On every push to main we build the static export and publish it there.
#
# One-time setup required (see docs/deployment.md):
#   1. Create a token that can write to king-wang123/king-wang123.github.io
#      (fine-grained PAT with "Contents: Read and write", or a classic PAT with "repo").
#   2. Add it to THIS repo as an Actions secret named DEPLOY_TOKEN
#      (Settings -> Secrets and variables -> Actions -> New repository secret).
#   3. In king-wang123.github.io repo: Settings -> Pages ->
#      Source = "Deploy from a branch", Branch = main / (root).

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Add .nojekyll (allow _next folder on GitHub Pages)
        run: touch out/.nojekyll

      - name: Deploy to king-wang123.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: king-wang123/king-wang123.github.io
          publish_branch: main
          publish_dir: ./out
          # Publish a clean, single-commit tree every time so stale build
          # artifacts (old chunk hashes) never linger and break navigation.
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: ${{ github.sha }}"
